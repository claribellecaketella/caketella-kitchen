<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Caketella Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EFFAF0;
  --card: #FFFFFF;
  --card-border: #C8E6C9;
  --text: #1B3A1B;
  --text-dim: #4A7A4A;
  --text-muted: #8AAF8A;
  --radius: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.container { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }

.header { text-align: center; padding: 12px 0 16px; }
.header-logo { font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #2E7D32; margin-bottom: 8px; }
.header-date { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; }
.header-sub { font-size: 14px; color: var(--text-dim); margin-top: 4px; }

.status-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); margin-bottom: 16px; font-size: 12px; color: var(--text-dim); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #34A853; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
.status-dot.error { background: #EA4335; animation: none; }

.cards { display: flex; gap: 8px; margin-bottom: 16px; }
.sum-card { flex: 1; padding: 14px 8px; border-radius: var(--radius); text-align: center; cursor: pointer; border: 2.5px solid transparent; transition: all 0.2s; }
.sum-card.s1 { background: #E8F5E8; }
.sum-card.s2 { background: #FFF8E1; }
.sum-card.s3 { background: #F3E8FF; }
.sum-card.selected.s1 { border-color: #388E3C; }
.sum-card.selected.s2 { border-color: #EF6C00; }
.sum-card.selected.s3 { border-color: #7B1FA2; }
.sum-card:active { transform: scale(0.97); }
.sum-card .num { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; }
.sum-card.s1 .num { color: #2E7D32; }
.sum-card.s2 .num { color: #E65100; }
.sum-card.s3 .num { color: #6A1B9A; }
.sum-card .lbl { font-size: 11px; font-weight: 600; margin-top: 2px; }
.sum-card.s1 .lbl { color: #388E3C; }
.sum-card.s2 .lbl { color: #EF6C00; }
.sum-card.s3 .lbl { color: #7B1FA2; }

.panel { display: none; }
.panel.active { display: block; }

.section { border-radius: var(--radius); overflow: hidden; border: 1.5px solid; background: var(--card); box-shadow: 0 2px 6px rgba(0,60,0,0.06); }
.section.s1 { border-color: #81C784; }
.section.s2 { border-color: #FFCC80; }
.section.s3 { border-color: #CE93D8; }

.section-head { padding: 13px 16px; font-size: 14px; font-weight: 600; color: #fff; display: flex; justify-content: space-between; align-items: center; }
.s1 .section-head { background: #388E3C; }
.s2 .section-head { background: #EF6C00; }
.s3 .section-head { background: #7B1FA2; }

.section-badge { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 8px; background: rgba(255,255,255,0.22); }

.sku-row { display: flex; justify-content: space-between; padding: 11px 16px; font-size: 15px; border-bottom: 1px solid; }
.sku-row:last-child { border-bottom: none; }
.s1 .sku-row { background: #E8F5E8; border-color: rgba(129,199,132,0.4); }
.s2 .sku-row { background: #FFF8E1; border-color: rgba(255,204,128,0.4); }
.s3 .sku-row { background: #F3E8FF; border-color: rgba(206,147,216,0.35); }
.sku-name { font-weight: 500; flex: 1; }
.sku-qty { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 17px; min-width: 40px; text-align: right; }
.s1 .sku-qty { color: #2E7D32; }
.s2 .sku-qty { color: #E65100; }
.s3 .sku-qty { color: #6A1B9A; }

.empty-state { padding: 20px 16px; text-align: center; font-size: 14px; font-style: italic; }
.s1 .empty-state { color: #388E3C; background: #E8F5E8; }
.s2 .empty-state { color: #EF6C00; background: #FFF8E1; }

.loading { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.loading-spinner { width: 32px; height: 32px; border: 3px solid var(--card-border); border-top-color: #2E7D32; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

.refresh-btn { display: block; width: 100%; padding: 14px; margin-top: 16px; background: var(--card); border: 1.5px solid var(--card-border); border-radius: var(--radius); color: var(--text-dim); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center; }
.refresh-btn:active { transform: scale(0.98); background: #DCEDC8; }

.timestamp { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 12px; font-family: 'JetBrains Mono', monospace; }

.error-msg { background: #FFF0F0; border: 1.5px solid #F0C0C0; border-radius: var(--radius); padding: 20px; text-align: center; color: #C03030; font-size: 14px; }
.no-orders-msg { background: var(--card); border: 1.5px solid var(--card-border); border-radius: var(--radius); padding: 32px 20px; text-align: center; color: var(--text-dim); font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-logo">Caketella Kitchen</div>
    <div class="header-date" id="prepDate">Loading...</div>
    <div class="header-sub" id="prepSub">Prep list</div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>

  <div id="content">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div>Loading prep list...</div>
    </div>
  </div>

  <button class="refresh-btn" onclick="loadData()">Refresh</button>
  <div class="timestamp" id="timestamp"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwRy0feTpT4SDCblMZsrNNwNMH4YsODtOdlfjinuho2q59zFtpteyp64Ium2o5hrkPK/exec?mode=kitchen";
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function getPrepDate() {
  const now = new Date();
  const d = new Date(now);
  let label;
  if (now.getHours() > 8 || (now.getHours() === 8 && now.getMinutes() >= 30)) {
    d.setDate(d.getDate() + 1);
    label = "Tomorrow's prep list";
  } else {
    label = "Today's prep list";
  }
  return {
    tag: d.getDate() + " " + MONTHS[d.getMonth()] + " " + d.getFullYear(),
    display: DAYS[d.getDay()] + ", " + d.getDate() + " " + MONTHS[d.getMonth()] + " " + d.getFullYear(),
    subtitle: label
  };
}

function setStatus(ok, text) {
  document.getElementById("statusDot").className = "status-dot" + (ok ? "" : " error");
  document.getElementById("statusText").textContent = text;
}

let currentPanel = "total";

function showPanel(id) {
  currentPanel = id;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.sum-card').forEach(c => c.classList.remove('selected'));
  const idx = {snap1:0, snap2:1, total:2}[id];
  document.querySelectorAll('.sum-card')[idx].classList.add('selected');
}

function renderContent(snap1Entries, snap2Entries) {
  const snap1Total = snap1Entries.reduce((s, e) => s + e[1], 0);
  const snap2Total = snap2Entries.reduce((s, e) => s + e[1], 0);

  const combinedMap = {};
  snap1Entries.forEach(([sku, qty]) => { combinedMap[sku] = (combinedMap[sku] || 0) + qty; });
  snap2Entries.forEach(([sku, qty]) => { combinedMap[sku] = (combinedMap[sku] || 0) + qty; });
  const combinedEntries = Object.entries(combinedMap).sort((a, b) => a[0].localeCompare(b[0]));
  const grandTotal = combinedEntries.reduce((s, e) => s + e[1], 0);

  let html = '';

  html += '<div class="cards">';
  html += '<div class="sum-card s1" onclick="showPanel(\'snap1\')"><div class="num">' + snap1Total + '</div><div class="lbl">Confirmed</div></div>';
  html += '<div class="sum-card s2" onclick="showPanel(\'snap2\')"><div class="num">+' + snap2Total + '</div><div class="lbl">Overnight</div></div>';
  html += '<div class="sum-card s3 selected" onclick="showPanel(\'total\')"><div class="num">' + grandTotal + '</div><div class="lbl">Total</div></div>';
  html += '</div>';

  html += '<div id="snap1" class="panel"><div class="section s1">';
  html += '<div class="section-head">Confirmed by 4:30pm <span class="section-badge">' + snap1Total + ' pcs</span></div>';
  if (snap1Entries.length === 0) {
    html += '<div class="empty-state">No orders confirmed yet</div>';
  } else {
    snap1Entries.forEach(([sku, qty]) => {
      html += '<div class="sku-row"><span class="sku-name">' + sku + '</span><span class="sku-qty">' + qty + '</span></div>';
    });
  }
  html += '</div></div>';

  html += '<div id="snap2" class="panel"><div class="section s2">';
  html += '<div class="section-head">Added overnight <span class="section-badge">+' + snap2Total + ' pcs</span></div>';
  if (snap2Entries.length === 0) {
    html += '<div class="empty-state">No overnight additions yet</div>';
  } else {
    snap2Entries.forEach(([sku, qty]) => {
      html += '<div class="sku-row"><span class="sku-name">' + sku + '</span><span class="sku-qty">+' + qty + '</span></div>';
    });
  }
  html += '</div></div>';

  html += '<div id="total" class="panel active"><div class="section s3">';
  html += '<div class="section-head">Total to prep <span class="section-badge">' + grandTotal + ' pcs</span></div>';
  if (combinedEntries.length === 0) {
    html += '<div class="empty-state">No orders yet</div>';
  } else {
    combinedEntries.forEach(([sku, qty]) => {
      html += '<div class="sku-row"><span class="sku-name">' + sku + '</span><span class="sku-qty">' + qty + '</span></div>';
    });
  }
  html += '</div></div>';

  document.getElementById("content").innerHTML = html;
  currentPanel = "total";
}

async function loadData() {
  const prep = getPrepDate();
  document.getElementById("prepDate").textContent = prep.display;
  document.getElementById("prepSub").textContent = prep.subtitle;

  try {
    const response = await fetch(API_URL + "&date=" + encodeURIComponent(prep.tag));
    if (!response.ok) throw new Error("Failed to fetch");
    const data = await response.json();

    if (data.error) {
      setStatus(true, "No orders yet");
      document.getElementById("content").innerHTML = '<div class="no-orders-msg">' + data.error + '</div>';
    } else {
      const snap1 = Object.entries(data.snapshot1 || {}).sort((a, b) => a[0].localeCompare(b[0]));
      const snap2 = Object.entries(data.snapshot2 || {}).sort((a, b) => a[0].localeCompare(b[0]));
      const totalItems = snap1.reduce((s, e) => s + e[1], 0) + snap2.reduce((s, e) => s + e[1], 0);

      renderContent(snap1, snap2);
      setStatus(true, "Live \u00B7 " + totalItems + " total pcs");
    }

    document.getElementById("timestamp").textContent = "Updated: " + new Date().toLocaleTimeString("en-MY", { hour: "2-digit", minute: "2-digit" });

  } catch (err) {
    setStatus(false, "Connection error");
    document.getElementById("content").innerHTML = '<div class="error-msg">Could not load data. Check your connection and try again.</div>';
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
